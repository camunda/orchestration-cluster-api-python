services:
  camunda:
    image: camunda/camunda:${CAMUNDA_DOCKER_IMAGE_VERSION:-8.10-SNAPSHOT}
    # If you want to override via env like the framework: set CAMUNDA_DOCKER_IMAGE_VERSION externally
    container_name: camunda-engine
    environment:
      SPRING_PROFILES_ACTIVE: 'broker,consolidated-auth'
      CAMUNDA_SYSTEM_CLOCK_CONTROLLED: 'true'
      ZEEBE_LOG_APPENDER: 'Stackdriver'
      CAMUNDA_SECURITY_AUTHENTICATION_UNPROTECTEDAPI: 'true'
      CAMUNDA_SECURITY_AUTHORIZATIONS_ENABLED: 'false'
      # H2 / in-memory config — uses new camunda.data.secondary-storage.rdbms.* properties
      CAMUNDA_DATA_SECONDARY_STORAGE_TYPE: 'rdbms'
      CAMUNDA_DATA_SECONDARY_STORAGE_RDBMS_URL: 'jdbc:h2:mem:cpt;DB_CLOSE_DELAY=-1;MODE=PostgreSQL'
      CAMUNDA_DATA_SECONDARY_STORAGE_RDBMS_USERNAME: 'sa'
      CAMUNDA_DATA_SECONDARY_STORAGE_RDBMS_PASSWORD: ''
      CAMUNDA_DATA_SECONDARY_STORAGE_RDBMS_AUTO_DDL: 'true'
      CAMUNDA_DATA_SECONDARY_STORAGE_RDBMS_FLUSH_INTERVAL: 'PT0S'
      CAMUNDA_DATA_SECONDARY_STORAGE_RDBMS_HISTORY_DEFAULT_HISTORY_TTL: 'PT2S'
      CAMUNDA_DATA_SECONDARY_STORAGE_RDBMS_HISTORY_MIN_HISTORY_CLEANUP_INTERVAL: 'PT2S'
      CAMUNDA_DATA_SECONDARY_STORAGE_RDBMS_HISTORY_MAX_HISTORY_CLEANUP_INTERVAL: 'PT5S'
      LOGGING_LEVEL_IO_CAMUNDA_DB_RDBMS: 'INFO'
      LOGGING_LEVEL_ORG_MYBATIS: 'INFO'
    ports:
      - '8080:8080' # REST API (ZEEBE_REST_ADDRESS -> http://localhost:8080)
      - '26500:26500' # gRPC Gateway
      - '9600:9600' # Monitoring / actuator / test time control
      # Uncomment if you need direct access to internal broker ports:
      # - "26501:26501" # Command API (internal)
      # - "26502:26502" # Internal API (internal)
    healthcheck:
      # Mimic readiness checks: uses monitoring port + health endpoint
      test: ['CMD', 'wget', '-qO', '-', 'http://localhost:9600/actuator/health/status']
      interval: 5s
      timeout: 3s
      retries: 30
    networks:
      - camunda-net

