name: CI

on:
  push:
    branches-ignore:
      - main
      - 'stable/**'
  pull_request:
    branches:
      - main
      - 'stable/**'
  workflow_dispatch:
    inputs:
      spec_ref:
        description: "Git ref/branch/tag/SHA in camunda/camunda.git to fetch the OpenAPI spec from (temporary override)."
        required: false
        default: ""

jobs:
  commitlint:
    if: github.event_name == 'pull_request'
    uses: camunda/sdk-infra/.github/workflows/sdk-commitlint.yml@v1

  spec-ref-guard:
    uses: camunda/sdk-infra/.github/workflows/sdk-spec-ref-guard.yml@v1
    with:
      spec-ref: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.spec_ref) || vars.SPEC_REF_OVERRIDE || 'main' }}
      default-ref: 'main'
      ack: ${{ vars.SPEC_REF_OVERRIDE_ACK || '' }}
      expires: ${{ vars.SPEC_REF_OVERRIDE_EXPIRES || '' }}

  bundle-spec:
    needs: spec-ref-guard
    uses: camunda/sdk-infra/.github/workflows/sdk-bundle-spec.yml@v1
    with:
      spec-ref: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.spec_ref) || vars.SPEC_REF_OVERRIDE || 'main' }}

  test:
    needs: bundle-spec
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v6

      - name: Download bundled spec
        uses: actions/download-artifact@v4
        with:
          name: bundled-spec
          path: external-spec/bundled/

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras --dev --group itest

      - name: Start Docker Compose
        run: docker compose -f docker/docker-compose.yaml up -d --wait

      - name: Run tests (Unit and Integration)
        run: make itest-local

      - name: Run type checker
        if: matrix.python-version == '3.12'
        run: make typecheck

      - name: Check SDK Example Coverage
        if: matrix.python-version == '3.12'
        run: python scripts/check_example_coverage.py

      - name: Check Method Example Completeness
        if: matrix.python-version == '3.12'
        run: python scripts/check_method_example_completeness.py

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: "pyproject.toml"

      - name: Install dependencies
        run: uv sync --all-extras --dev

      # If the following task fails, run make config-reference to update the config reference in README and push the changes
      - name: Check config reference is up-to-date
        run: make config-reference-check

      # If the following task fails, run make sync-readme to update README snippets and push the changes
      - name: Check README snippets are up-to-date
        run: make sync-readme-check

      - name: Run linter
        run: make lint

      - name: Check docs links
        run: make docs-link-check
