name: Test org membership API

on:
  workflow_dispatch:
    inputs:
      username:
        description: "GitHub username to check"
        required: true
        default: "emilyoram"

permissions: {}

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Test authenticated /orgs/camunda/members endpoint
        env:
          GH_TOKEN: ${{ github.token }}
          USERNAME: ${{ inputs.username }}
        run: |
          echo "=== Testing with GITHUB_TOKEN ==="
          echo "Username: $USERNAME"
          echo ""

          echo "--- Authenticated /orgs/camunda/members/$USERNAME ---"
          AUTH_CODE=$(curl -s -o /tmp/auth-response.txt -w "%{http_code}" \
            --max-time 10 \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/orgs/camunda/members/$USERNAME")
          echo "HTTP status: $AUTH_CODE"
          echo "Response body:"
          cat /tmp/auth-response.txt | head -5
          echo ""

          echo "--- Unauthenticated /orgs/camunda/public_members/$USERNAME ---"
          PUBLIC_CODE=$(curl -s -o /tmp/public-response.txt -w "%{http_code}" \
            --max-time 10 \
            "https://api.github.com/orgs/camunda/public_members/$USERNAME")
          echo "HTTP status: $PUBLIC_CODE"
          echo "Response body:"
          cat /tmp/public-response.txt | head -5
          echo ""

          echo "=== Summary ==="
          echo "Authenticated members endpoint: $AUTH_CODE (204=member, 302=not-requester-is-not-org-member, 404=not-member-or-no-access)"
          echo "Public members endpoint: $PUBLIC_CODE (204=public-member, 404=not-public-member)"
