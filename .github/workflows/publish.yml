name: Publish

on:
  push:
    branches:
      - main
      - 'stable/**'
  workflow_dispatch:
    inputs:
      spec_ref:
        description: "Git ref/branch/tag/SHA in camunda/camunda.git to fetch the OpenAPI spec from (temporary override)."
        required: false
        default: ""

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  spec-ref-guard:
    uses: camunda/sdk-infra/.github/workflows/sdk-spec-ref-guard.yml@v1
    with:
      spec-ref: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.spec_ref) || vars.SPEC_REF_OVERRIDE || 'main' }}
      default-ref: 'main'
      ack: ${{ vars.SPEC_REF_OVERRIDE_ACK || '' }}
      expires: ${{ vars.SPEC_REF_OVERRIDE_EXPIRES || '' }}

  bundle-spec:
    needs: spec-ref-guard
    uses: camunda/sdk-infra/.github/workflows/sdk-bundle-spec.yml@v1
    with:
      spec-ref: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.spec_ref) || vars.SPEC_REF_OVERRIDE || 'main' }}

  test:
    needs: bundle-spec
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Clear checked-in spec (prevent stale fallback)
        run: rm -rf external-spec/bundled/*

      - name: Download bundled spec
        uses: actions/download-artifact@v8
        with:
          name: bundled-spec
          path: external-spec/bundled/

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras --dev --group itest

      - name: Start Integration Stack
        uses: camunda/sdk-infra/actions/start-camunda@v1
        with:
          docker-dir: docker

      - name: Run integration tests
        run: make itest-local

      - name: Stop Integration Stack
        if: always()
        uses: camunda/sdk-infra/actions/stop-camunda@v1
        with:
          docker-dir: docker
          artifact-name: publish-docker-logs-py${{ matrix.python-version }}

  generate:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      has_changes: ${{ steps.check_changes.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Clear checked-in spec (prevent stale fallback)
        run: rm -rf external-spec/bundled/*

      - name: Download bundled spec
        uses: actions/download-artifact@v8
        with:
          name: bundled-spec
          path: external-spec/bundled/

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: "pyproject.toml"

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Generate SDK
        run: make generate-local

      - name: Check for changes
        id: check_changes
        run: |
          if [[ -n $(git status -s) ]]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit generated changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "chore(generation): update generated SDK [skip ci]"
          git pull --rebase
          git push

  release:
    needs: generate
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    environment: pypi
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: "pyproject.toml"

      - name: Install dependencies
        run: uv sync --all-extras --dev --group ci

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Check if release needed (dry run)
        id: check_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OUTPUT=$(uv run semantic-release version --print 2>&1) || true
          if echo "$OUTPUT" | grep -q "No release will be made"; then
            echo "release_needed=false" >> $GITHUB_OUTPUT
          else
            echo "release_needed=true" >> $GITHUB_OUTPUT
            NEW_VERSION=$(uv run semantic-release version --print 2>/dev/null | tail -1)
            echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          fi

      - name: Validate version matches stable branch
        if: steps.check_release.outputs.release_needed == 'true' && startsWith(github.ref_name, 'stable/')
        run: |
          # Extract expected major from branch name (e.g., stable/9 -> 9)
          BRANCH_MAJOR=$(echo "${{ github.ref_name }}" | sed 's|stable/||')
          NEW_VERSION="${{ steps.check_release.outputs.new_version }}"

          if [[ ! "$NEW_VERSION" =~ ^${BRANCH_MAJOR}\. ]]; then
            echo "::error::Version $NEW_VERSION doesn't match branch constraint ${BRANCH_MAJOR}.x"
            echo "Stable branches should only receive patch and minor releases."
            echo "Use a BREAKING CHANGE footer on main to bump the major version."
            exit 1
          fi

          echo "Version $NEW_VERSION matches branch constraint ${BRANCH_MAJOR}.x"

      - name: Create release
        if: steps.check_release.outputs.release_needed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          uv run semantic-release version
          uv run semantic-release publish

      - name: Build package
        if: steps.check_release.outputs.release_needed == 'true'
        run: uv build

      - name: Publish to PyPI
        if: steps.check_release.outputs.release_needed == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

      - name: Summary
        run: |
          if [[ "${{ steps.check_release.outputs.release_needed }}" == "true" ]]; then
            echo "### Release Published :rocket:" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Version:** ${{ steps.check_release.outputs.new_version }}" >> $GITHUB_STEP_SUMMARY
            echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
            if [[ "${{ github.ref_name }}" == "main" ]]; then
              echo "**Type:** Dev pre-release" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "Install with: \`pip install camunda-orchestration-sdk --pre\`" >> $GITHUB_STEP_SUMMARY
            else
              STABLE_MAJOR=$(echo "${{ github.ref_name }}" | sed 's|stable/||')
              echo "**Type:** Stable release" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "Install with: \`pip install \"camunda-orchestration-sdk>=${STABLE_MAJOR}.0.0,<$((STABLE_MAJOR+1)).0.0\"\`" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "### No Release Needed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "No commits requiring a release were found." >> $GITHUB_STEP_SUMMARY
          fi

  notify-release-failure:
    needs: [spec-ref-guard, bundle-spec, test, generate, release]
    if: ${{ always() && contains(needs.*.result, 'failure') }}
    permissions: {}
    uses: camunda/sdk-infra/.github/workflows/sdk-slack-notify.yml@v1
    with:
      repo-name: orchestration-cluster-api-python
      workflow-name: Publish
      mention-group: ${{ vars.SLACK_MENTION_GROUP }}
    secrets:
      slack-webhook-url: ${{ secrets.SLACK_SDK_ALERTS }}
